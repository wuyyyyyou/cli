name: Release Executa Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example executa-v0.22.5
        required: true
        type: string
      release_name:
        description: Optional GitHub Release title. Defaults to the tag.
        required: false
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            label: macos-amd64
            dist_file: gws-executa-darwin-x86_64
            archive_name: gws-executa-macos-amd64.tar.gz
            checksum_name: gws-executa-macos-amd64.tar.gz.sha256
            binary_name: gws-executa
            archive_type: tar.gz
          - runner: macos-15
            label: macos-arm64
            dist_file: gws-executa-darwin-arm64
            archive_name: gws-executa-macos-arm64.tar.gz
            checksum_name: gws-executa-macos-arm64.tar.gz.sha256
            binary_name: gws-executa
            archive_type: tar.gz
          - runner: windows-latest
            label: windows-amd64
            dist_file: gws-executa-windows-x86_64.exe
            archive_name: gws-executa-windows-amd64.zip
            checksum_name: gws-executa-windows-amd64.zip.sha256
            binary_name: gws-executa.exe
            archive_type: zip

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          key: release-executa-${{ matrix.runner }}

      - name: Build binary
        shell: bash
        run: bash crates/google-workspace-cli/build_binary.sh

      - name: Package (unix)
        if: matrix.archive_type == 'tar.gz'
        shell: bash
        run: |
          mkdir -p staging
          cp "crates/google-workspace-cli/dist/${{ matrix.dist_file }}" "staging/${{ matrix.binary_name }}"
          cp LICENSE README.md "staging/"
          tar czf "${{ matrix.archive_name }}" -C staging .
          shasum -a 256 "${{ matrix.archive_name }}" > "${{ matrix.checksum_name }}"

      - name: Package (windows)
        if: matrix.archive_type == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging | Out-Null
          Copy-Item "crates/google-workspace-cli/dist/${{ matrix.dist_file }}" "staging/${{ matrix.binary_name }}"
          Copy-Item LICENSE, README.md staging
          Compress-Archive -Path "staging/*" -DestinationPath "${{ matrix.archive_name }}" -Force
          (Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.archive_name }}" | Out-File -Encoding ascii "${{ matrix.checksum_name }}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: executa-${{ matrix.label }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.checksum_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: executa-*
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          title="${RELEASE_NAME:-$RELEASE_TAG}"
          prerelease_flag=""
          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          notes_file="$(mktemp)"
          {
            printf '%s\n' 'Prebuilt `gws-executa` binaries for:'
            printf '\n'
            printf '%s\n' '- macOS amd64'
            printf '%s\n' '- macOS arm64'
            printf '%s\n' '- Windows amd64'
            printf '\n'
            printf '%s\n' 'Each asset includes the binary plus `LICENSE` and `README.md`.'
            printf '%s\n' 'SHA-256 checksum files are uploaded alongside each archive.'
          } > "$notes_file"

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" artifacts/* --clobber --repo "$GH_REPO"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GH_REPO" \
              --target "$TARGET_SHA" \
              --title "$title" \
              --notes-file "$notes_file" \
              $prerelease_flag \
              artifacts/*
          fi
